<!DOCTYPE html>
<html>
<head>

<title>Trip Planner</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</head>

<body>

<h1>Trip Itinerary Planner</h1>

<div class="trip-box">
<input id="tripName" placeholder="Trip name">
<input id="tripDates" placeholder="Trip dates">
<button onclick="saveTrip()">Save Trip</button>
</div>

<h2>Days</h2>

<div id="days"></div>

<button onclick="addDay()">+ Add Day</button>

<br><br>

<button onclick="exportPDF()">Export Itinerary PDF</button>

<h2>Search Place</h2>

<input id="placeSearch" placeholder="Search place">
<button onclick="searchPlace()">Search</button>

<h2>Map</h2>

<div id="map"></div>

<script src="app.js"></script>

<script>
if('serviceWorker' in navigator){
navigator.serviceWorker.register('service-worker.js')
}
</script>

</body>
</html>
